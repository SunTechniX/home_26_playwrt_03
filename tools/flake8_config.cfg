# tools/flake8_config.cfg
[flake8]
max-line-length = 120
ignore = E203,W503,W291,W293,D100,D101,D102,D103,D104,D105,D106,D107
exclude = 
    .git,
    __pycache__,
    .venv,
    venv,
    output/,
    tools/output/,
    .github/,
    *.md,
    *.txt
show-source = true
statistics = true
count = true
format = %(path)s:%(row)d:%(col)d: %(code)s %(text)s